deck:
  title: "AI駆動で、業務をやる"
  subtitle: "「開発」を超えて、すべての業務をAI駆動に — Agent / Skill / Rule / Hook ハンズオン"
  theme: default
  date: "2026-06-23"

chapters:
  - chapter: "表紙"
    slides:
      - title: "AI駆動で、業務をやる"
        summary: "目指すのはAI駆動“開発”にとどまらない。あらゆる業務をAIに委譲する「AI駆動チーム」への一歩を、手を動かして掴む。"
        content:
          - "テーマ: AI駆動開発ハンズオン＆講座"
          - "対象: ClaudeCode / GitHub Copilot 利用者（Microsoft Copilot 利用者は座学パートまで）"
          - "ゴール: 「課題整理 → AI生成 → デモ → 改善issue」のloopを一周回す"
        expression: title
        data: {}

  - chapter: "前提・本日の進め方"
    slides:
      - title: "本日の目的"
        summary: "AIで業務をする。開発に閉じず、繰り返し作業はAIへ。自分はAIを含む作業フローの"一部"になる。"
        content:
          - "AIを使って業務をしたい — “開発”にとどまらず、すべての業務をAI駆動に"
          - "理想像は「AI駆動チーム」: 人とAIが1つの作業フローを構成する"
          - "自分はフローの一部にすぎず、ほぼすべての作業はAIで自動化できる"
          - "ただし一足飛びではない — スキル・ルールの充実を積み上げて初めて到達する"
        expression: emphasis
        data:
          mode: message
          text: "自分は、AIを含む作業フローの“一部”である。"

      - title: "対象者と3つのレーン"
        summary: "使えるAIツールで到達点が変わる。座学は全員共通、実践はコーディングエージェント保有者が手を動かす。"
        content:
          - "Claude Code 勢（少数）: 実践フルコース。エージェント/スキル/フックまで自作"
          - "GitHub Copilot 勢（半数）: 実践フルコース。.github 側のミラー構成で同じことを実現"
          - "Microsoft Copilot 勢: 座学パートまで（コーディングエージェント未使用のため）"
          - "→ 座学は“考え方”の共有、実践は“手を動かす”時間"
        expression: comparison
        data:
          mode: two-column
          left:
            label: "座学編（全員共通）"
            items:
              - "AI駆動開発の方向性と思想"
              - "効率化の仕組み: Agent/Skill/Rule/Hook"
              - "コーディングエージェントが最強の基盤"
          right:
            label: "実践編（Claude Code / Copilot）"
            items:
              - "課題整理 → AIで一括生成"
              - "デモ実行 → 改善issue起票"
              - "loopを一周回す"

      - title: "本日のアジェンダ"
        summary: "座学で“なぜ・何を”を揃え、実践で“どうやって”を一周する。"
        content:
          - "座学1-2: AI駆動開発のこれからと、働き方の変遷"
          - "座学3: 「3回やったらAI化」— 繰り返し作業の棚卸し"
          - "座学4-5: 仕組み（4点セット）・業務のloopの作り方"
          - "実践1-6: 棚卸し → リポジトリ用意 → 課題整理エージェント → AI生成 → デモ → 改善issue"
        expression: bullet
        data: {}

  - chapter: "座学1: AI駆動開発のこれから"
    slides:
      - title: "AI駆動開発のこれから"
        summary: "「AI導入の検証」段階は終わり、「AIに仕事を任せる」段階へ。対象は開発から全業務に広がる。"
        content:
          - "AIに手伝ってもらい人がタスクを完遂する → AIが"やりたいこと（業務フロー全体）を完遂"する時代へ"
          - "適用範囲がすべての業務（調査・資料作成・運用・定型業務）へ拡大"
          - "人の役割は「実作業者」から「AIに任せる設計者・レビュアー」へシフト"
          - "勝ち筋は"業務の仕組み化": 業務をひとつずつAI化し、繰り返し効く資産を積む"
        expression: bullet
        data: {}

  - chapter: "座学2: AIを利用した働き方の変遷"
    slides:
      - title: "AI利用の変遷"
        summary: "手書き → 補完 → エージェント駆動 → loop駆動。人の関与は"手を動かす人"から"流れを設計する人"へ移る。"
        content:
          - "手書き: 人が全部やる"
          - "補完: AIが部分提案（Copilot補完）。人が主役"
          - "エージェント駆動: AIがタスク単位で実行。人はレビュー"
          - "loop駆動: 課題→生成→検証→改善の輪をAIが回す。人は輪を設計する"
        expression: flow
        data:
          type: steps
          orientation: horizontal
          steps:
            - { label: "手書き", desc: "人が全部やる" }
            - { label: "補完", desc: "AIが部分提案・人が主役" }
            - { label: "エージェント駆動", desc: "AIがタスクを実行・人はレビュー" }
            - { label: "loop駆動", desc: "AIが輪を回す・人は輪を設計" }

  - chapter: "座学3: 3回やったらAI化"
    slides:
      - title: "3回やったら、AI化"
        summary: "同じ作業を3回以上やったら、それはAIに渡す合図。手作業の棚卸しから始まる。"
        content:
          - "手動で繰り返している作業はないか？を常に問う"
          - "3回以上やったなら、手順は十分に固まっている = 仕組み化できる"
          - "「面倒」を感じた瞬間が、AI化のシグナル"
          - "Tips: この「3回やったらAI化」の管理自体もAIに任せてOK（参考: Effective Claude Code — docs.anthropic.com/ja/docs/claude-code）"
          - "例: 日々の進捗報告・疑問点の整理・定例資料の作成・調査まとめ"
        expression: emphasis
        data:
          mode: message
          text: "同じ作業を3回やったら、AI化しよう。"

      - title: "自分は、作業フローの一部"
        summary: "ほぼすべての作業はAIで自動化できる。ただしskill・agentの積み上げがあって初めて成立する。"
        content:
          - "前提: 自分の作業の大半は、手順化すればAIが代行できる"
          - "現実: いきなり全自動にはならない"
          - "→ まずは「スキル化・ルール化・エージェント化」を積み上げる"
          - "だから"積み上げ"が効く: 全員が作るほどAIの守備範囲が広がる"
          - "人の仕事は「手を動かす」から「フローを設計し、任せ、確かめる」へ"
        expression: structure
        data:
          type: pyramid
          layers:
            - "土台: 全員がrule/skill/agentを積み上げる"
            - "中: エージェントがあらゆる業務タスクを自律実行"
            - "頂点: 人はフロー設計とレビューに専念"

  - chapter: "座学4: 効率化の仕組み（ディレクトリ構成）"
    slides:
      - title: "効率化の仕組み = ディレクトリ構成"
        summary: "AIを効率的に使う鍵は、リポジトリ直下に置く"4点セット"。Agent / Skill / Rule / Hook。"
        content:
          - "Agent: 役割特化の専門家（タスク作成/スライド作成/レビュー等）"
          - "Skill: 再利用可能なワークフロー手順（SKILL.md）"
          - "Rule: 常に適用される規約・ガードレール（rules/*.md）"
          - "Hook: ツール実行前後の自動チェック・ブロック（settings.json + hooks/*.sh）"
        expression: structure
        data:
          type: tree
          root: ".claude/（AIの設定一式）"
          children:
            - name: "agents/"
              children:
                - name: "役割特化エージェント（designer/executor/reviewer）"
            - name: "skills/"
              children:
                - name: "再利用ワークフロー（SKILL.md）"
            - name: "rules/"
              children:
                - name: "常時適用ルール（git.md / security.md）"
            - name: "hooks/ + settings.json"
              children:
                - name: "自動ブロック・自動整形"

      - title: "4点セットの役割と実例"
        summary: "それぞれが「いつ効くか」を実物で押さえる。組み合わせでAIの精度と安全性が決まる。"
        content:
          - "Agent: 議事録の「収集→ドラフト→確認」を3エージェントに分業させ品質を上げる"
          - "Skill: 「Issueを作成して」で create-issue スキルが対話的にテンプレ起票"
          - "Rule: git.md が『mainで直接作業禁止・worktreeで作業』を常時強制"
          - "Hook: 危険操作（force-push等）・秘密情報の流出を自動ブロック"
        expression: comparison
        data:
          mode: two-column
          left:
            label: "守るべきルール・仕組み（Rule / Hook）"
            items:
              - "Rule: タスクのフォーマット遵守"
              - "Hook: 危険操作・秘密情報の流出を自動ブロック"
              - "Hook: .env書き込み・意図しない変更を検出"
          right:
            label: "人間のやっていたことの代わり（Agent / Skill）"
            items:
              - "Agent: タスク作成/スライド作成/レビューを分業"
              - "Skill: 定例報告・資料作成・調査等の定型手順"

  - chapter: "座学5: ループするには"
    slides:
      - title: "業務をloopにする、考え方"
        summary: "ツールを作るだけでなく「繰り返し回る仕組み」にすることが目標。課題整理→生成→デモ→改善issueが1ループ、毎周ごとに精度が上がる。"
        content:
          - "作った skill/agent を"1回使う"ではなく"ループで回す"ことが目標"
          - "loop = 課題整理→生成→デモ→改善issue→課題整理…の繰り返し"
          - "最初のloopは粗くていい — 回すたびに改善issueが蓄積され精度が上がる"
          - "loop自体を資産にする: 誰でも同じ品質で回せる仕組みが「AI駆動チーム」の核"
        expression: flow
        data:
          type: cycle
          steps:
            - { label: "課題整理", desc: "対話でまとめる" }
            - { label: "AI生成", desc: "skill/agent を作る" }
            - { label: "デモ", desc: "実際に動かす" }
            - { label: "改善issue", desc: "次の一周へ" }

      - title: "具体例: 週次報告をloop化する"
        summary: "手動で毎週やっていた進捗報告を例に、課題整理→生成→デモ→改善issueのloopを一周辿る。"
        content:
          - "課題整理: 「毎週コミットを見て進捗を書いている」を整理 → skill化の対象と確定"
          - "生成: commit-report スキルを生成（git log → 整形 → Slack投稿）"
          - "デモ: /commit-report で実行。80%できた、残り20%は課題"
          - "改善issue: 「祝日除外」「複数リポジトリ対応」を issue 起票 → 次のloopへ"
        expression: flow
        data:
          type: steps
          orientation: vertical
          steps:
            - { label: "課題整理", desc: "毎週の手作業を整理・分類する" }
            - { label: "生成", desc: "commit-report スキルをAIが生成" }
            - { label: "デモ", desc: "/commit-report を実行、動作確認" }
            - { label: "改善issue", desc: "残課題を起票して次のloopへ" }


  - chapter: "実践0: 進め方"
    slides:
      - title: "実践編の進め方"
        summary: "3〜6（課題整理→生成→デモ→改善issue）を一周できたらゴール。レーンごとに使うツールが違うだけ。"
        content:
          - "ゴール: 「課題整理エージェント → AI生成 → デモ → 改善issue」を一周"
          - "繰り返すほど精度が上がる — loopそのものを資産にする"
          - "Claude Code 勢と Copilot 勢で"道具"は違うが、流れは完全に同じ"
          - "本日は1周。持ち帰って各自のリポジトリで回し続けるのが本番"
        expression: flow
        data:
          type: cycle
          steps:
            - { label: "課題整理", desc: "対話でまとめる" }
            - { label: "AI生成", desc: "skill/rule/agent/hook を作る" }
            - { label: "デモ", desc: "実際に動かす" }
            - { label: "改善issue", desc: "次の一周へ" }

  - chapter: "実践1: 棚卸し"
    slides:
      - title: "複数回やっている作業・課題を書き出す"
        summary: "loopの燃料は"自分の繰り返し作業"。まず手で書き出して、AI化候補を見つける。"
        content:
          - "直近で3回以上やった作業をリストアップ"
          - "各作業の「手順・入力・出力・つまずき」を一言で添える"
          - ""面倒・毎回ググる・コピペ"が多いものほど良い候補"
          - "1つ選ぶ — 本日はこれをAI化する"
          - "例: 日々の進捗報告・疑問点の整理・定例資料の作成・調査まとめ"
        expression: bullet
        data: {}

  - chapter: "実践2: リポジトリを用意"
    slides:
      - title: "リポジトリをクローン（or fork してpush）"
        summary: "コピー済みハンズオン用リポジトリを手元に。今後を見据え「各自リポジトリを持つ」かはAIと相談。"
        content:
          - "ハンズオン用リポジトリ（.claude/.github コピー済み）を clone"
          - "自分用に進めるなら fork → push でもOK"
          - "論点: 今後AI駆動で進めるなら、各自が自分のリポジトリを持つ手もある"
          - "→ この判断自体、AIと相談して決めてよい（壁打ち相手にする）"
        expression: comparison
        data:
          mode: two-column
          left:
            label: "Claude Code レーン"
            items:
              - "git clone でハンズオン用リポジトリを取得"
              - ".claude/ の agents・skills・rules・hooks を確認"
              - "worktreeで作業（git.md ルールに従う）"
          right:
            label: "GitHub Copilot レーン"
            items:
              - "fork → clone（自分のリポジトリで進める）"
              - ".github/ の instructions・agents・skills を確認"
              - "copilot-instructions.md で全体方針を把握"

  - chapter: "実践3: 課題整理エージェント"
    slides:
      - title: "課題整理エージェントで対話 → md化"
        summary: "課題整理エージェントと対話し、自分の作業を skill/rule/agent/hook のベースとして md に起こす。"
        content:
          - "棚卸しで選んだ作業を、エージェントに対話ベースで説明する"
          - "エージェントが手順・前提・禁止事項・自動化ポイントを質問で引き出す"
          - "アウトプット: skill / rule / agent / hook の"たたき台md"一式"
          - "※この課題整理エージェント自体も、今後ハンズオンで作っていく対象"
        expression: flow
        data:
          type: steps
          orientation: vertical
          steps:
            - { label: "説明", desc: "選んだ作業をエージェントに話す" }
            - { label: "深掘り", desc: "手順・前提・禁止事項を質問で引き出す" }
            - { label: "分類", desc: "skill/rule/agent/hook のどれかに割り振る" }
            - { label: "md化", desc: "各ベースを Markdown で出力" }

  - chapter: "実践4: AIで一括生成"
    slides:
      - title: "AIですべて作成"
        summary: "たたき台mdを渡し、AIに skill/rule/agent/hook の本体を一括生成させる。レーンで置き場所が変わるだけ。"
        content:
          - "たたき台mdを入力に、AIが実体ファイルを生成"
          - "Claude Code: .claude/ 配下（SKILL.md / rules / agents / hooks）"
          - "GitHub Copilot: .github/ 配下（skills / instructions / *.agent.md）"
          - "生成後すぐ中身をレビュー — 任せきりにしない"
        expression: comparison
        data:
          mode: two-column
          left:
            label: "Claude Code が生成"
            items:
              - "skills/<name>/SKILL.md"
              - "rules/<topic>.md"
              - "agents/<role>.md"
              - "hooks/*.sh + settings.json"
          right:
            label: "GitHub Copilot が生成"
            items:
              - "skills/<name>/（ミラー）"
              - "instructions/<topic>.instructions.md"
              - "agents/<role>.agent.md"
              - "copilot-instructions.md 追記"

  - chapter: "実践5: デモを実行"
    slides:
      - title: "デモを実行"
        summary: "作った仕組みを実際に動かす。狙った業務がAIで完遂できるかを、その場で確かめる。"
        content:
          - "生成したスキル/エージェントを実際に起動して作業させる"
          - "Hook が意図通りに危険操作をブロックするか確認"
          - "Rule が守られているか（作業フローが崩れていないか等）を確認"
          - "うまくいった点・崩れた点をメモ"
        expression: bullet
        data: {}

  - chapter: "実践6: 改善issueを起票"
    slides:
      - title: "改善点を洗い出して issue 起票"
        summary: "デモで見えた粗さを issue にする。これが次の一周の入力になり、loopが精度を上げていく。"
        content:
          - "デモで崩れた点・あと一歩だった点を具体的に書き出す"
          - "create-issue スキル / gh issue create でテンプレ起票"
          - "issueが次の「課題整理（実践3）」の入力になる"
          - "→ 3〜6が閉じて、loopが回り始める"
        expression: bullet
        data: {}

  - chapter: "まとめ"
    slides:
      - title: "loopで業務が回る、がゴール"
        summary: "課題整理→生成→デモ→改善issueを繰り返すほど、skill・agentが充実しloopで業務が回り始める。"
        content:
          - "1周でも「自分の業務をAI化する型」が手に入る"
          - "繰り返すほど skill/rule/agent/hook が充実し、AIの守備範囲が広がる"
          - "やがてチーム全員がskill・agentを持ち、loopで業務が回り始める"
        expression: flow
        data:
          type: cycle
          steps:
            - { label: "③課題整理", desc: "対話でまとめる" }
            - { label: "④AI生成", desc: "一括で作る" }
            - { label: "⑤デモ", desc: "動かして確かめる" }
            - { label: "⑥改善issue", desc: "次の一周へ" }

      - title: "全員がskill・agentを作る、当たり前へ"
        summary: "skill・agentを作ることが"当たり前"になったとき、全員の業務がloopで回り始める。それがAI駆動チームのゴール。"
        content:
          - "loopを一周回せた = 自分の業務をAI化する型が身についた"
          - "型を言語化できれば、AIに回させる"loopプロンプト"が書ける"
          - "skill・agentを作る"当たり前"が、チーム全員に広がっていく"
          - "Next Action: 持ち帰り、自分のリポジトリでloopを回し続ける"
        expression: emphasis
        data:
          mode: message
          text: "業務がloopで回る。それが、AI駆動チームの最終ゴール。"

  - chapter: "Appendix: コーディングエージェントが、最強の基盤"
    slides:
      - title: "コーディングエージェントが、最強の基盤"
        summary: "ほとんどの業務は"ファイルとコマンド"に落ちる。それを扱えるコーディングエージェントは、全業務で最も適用範囲が広い。"
        content:
          - "資料作成・調査・データ処理・運用 — 多くは"ファイルとコマンド"に落ちる"
          - "ファイルとコマンドを扱えるコーディングエージェントは、適用範囲が最も広い"
          - "Agent/Skill/Rule/Hook の考え方は Claude Code でも Copilot でも共通"
          - "→ まずコーディングエージェントの仕組みを押さえれば、他のツールへも応用が効く"
          - "「エンジニアは、コードを1行ずつ書く個人ではなく『エージェントのテックリード』として考えるべきだ」— Sridhar Ramaswamy（Snowflake CEO）"
        expression: emphasis
        data:
          mode: quote
          text: "エンジニアは、コードを1行ずつ書く個人ではなく『エージェントのテックリード』として考えるべきだ。"
          cite: "— Sridhar Ramaswamy（Snowflake CEO）"

  - chapter: "MCP"
    slides:
      - title: "Redmine"
      - title: "Backlog"


