deck:
  title: "Claude Code を安全に使う：懸念を設計で抑え込む"
  subtitle: "サンプル：ClaudeCodeのセキュリティ懸念とその対策について"
  theme: default
  date: "2026-06-16"

chapters:
  - chapter: "表紙"
    slides:
      - title: "Claude Code を安全に使う"
        summary: "セキュリティは後付けでなく、権限・隔離・レビューの設計で作る。"
        content:
          - "サンプル：ClaudeCodeのセキュリティ懸念とその対策について"
          - "対象: 開発チーム / プラットフォーム・セキュリティ担当"
          - "ゴール: 懸念を正しく理解し、明日からの運用に落とす"
        expression: title
        data: {}

  - chapter: "アジェンダ"
    slides:
      - title: "本日の流れ"
        summary: "背景から課題・目的・対策・効果・次の一歩まで順に押さえる。"
        content:
          - "背景: Claude Code とは何か"
          - "課題/懸念: 何がリスクなのか（5つの論点）"
          - "目的: 何を達成したいのか"
          - "対策: 権限・隔離・レビュー・シークレット管理・自動レビュー"
          - "効果・まとめ・Next Action"
        expression: bullet
        data: {}

  - chapter: "背景"
    slides:
      - title: "Claude Code とは"
        summary: "Claude Code はターミナルで動き、ファイル編集やコマンド実行までエージェントが代行する開発ツール。"
        content:
          - "自然言語の指示でコード探索・編集・テスト・コミットを実行"
          - "ファイル読み書き・シェルコマンド・MCP 経由の外部ツール連携が可能"
          - "強力ゆえに『何をどこまで実行させるか』の制御が前提になる"
          - "利用が広がるほど、組織としての安全な運用設計が必要"
        expression: bullet
        data: {}

  - chapter: "課題/懸念"
    slides:
      - title: "懸念の全体像"
        summary: "リスクは『影響の大きさ × 起こりやすさ』で4象限に整理でき、まず右上から手当てする。"
        content:
          - "右上(最優先): 任意コード/コマンド実行、破壊的変更"
          - "左上(重大だが稀): サプライチェーン/外部MCP汚染"
          - "右下(頻発するが軽微): 操作ミス・誤った差分"
          - "左下: 軽微な情報露出 — 監視で十分なことも"
        expression: structure
        data:
          type: matrix-2x2
          axis_x: "起こりやすさ"
          axis_y: "影響の大きさ"
          quadrants:
            - "破壊的変更 / 任意コマンド実行（最優先）"
            - "サプライチェーン・外部MCP汚染（要備え）"
            - "操作ミス・誤差分（仕組みで防ぐ）"
            - "軽微な情報露出（監視で対応）"

      - title: "懸念の核心: 漏えいとインジェクション"
        summary: "破壊的操作に加え、シークレットの読み取りと悪意あるコンテンツによる指示の乗っ取りが二大経路。"
        content:
          - "シークレット漏えい: .env・鍵・トークンを読ませて外部へ送信される恐れ"
          - "プロンプトインジェクション: 悪意あるファイル/READMEや依存パッケージに仕込まれた指示にエージェントが従う"
          - "信頼できない入力(Issue・Web取得・外部MCP応答)を『指示』として扱う危険"
          - "サプライチェーン: 依存や外部MCPサーバ自体が汚染源になりうる"
        expression: structure
        data:
          type: tree
          root: "信頼できない入力 → 被害"
          children:
            - name: "機密情報の漏えい"
              children:
                - name: "シークレット読取(.env/鍵)"
                - name: "ログ・履歴への露出"
            - name: "プロンプトインジェクション"
              children:
                - name: "悪意あるファイル/README"
                - name: "汚染された依存・外部MCP"

  - chapter: "目的"
    slides:
      - title: "本プレゼンの目的"
        summary: "生産性を落とさずに『取り返しのつかない事故』をゼロに近づけることがゴール。"
        content:
          - "Why: 強力さを活かしつつ重大インシデントを防ぐ"
          - "原則: 最小権限・既定は安全側・人による最終確認"
          - "目標: 破壊的操作とシークレット流出を仕組みで止める"
        expression: emphasis
        data:
          mode: message
          text: "便利さを殺さず、取り返しのつかない事故をゼロに"

  - chapter: "対策"
    slides:
      - title: "対策の全体方針"
        summary: "『権限で絞る → 環境で隔離する → 人がレビューする』の三層で多重防御する。"
        content:
          - "第1層 権限: 許可制・プランモードで実行範囲を制御"
          - "第2層 隔離: サンドボックス/コンテナで影響範囲を封じ込め"
          - "第3層 レビュー: 差分確認・コミット前確認で人が最終判断"
          - "横断: シークレット管理・最小権限・自動レビューで底上げ"
        expression: flow
        data:
          type: steps
          orientation: horizontal
          steps:
            - { label: "権限で絞る", desc: "許可制 / プランモード" }
            - { label: "環境で隔離", desc: "サンドボックス / コンテナ" }
            - { label: "人がレビュー", desc: "差分・コミット前確認" }

      - title: "対策1: 権限モードを使い分ける"
        summary: "既定は許可制かプランモードにし、全自動の自動承認は限定された安全な環境だけに留める。"
        content:
          - "許可制: 危険操作の前に都度ユーザー確認"
          - "プランモード: 実行せず計画だけ提示させ、人が承認"
          - "自動承認: 隔離環境・読み取り中心のタスクに限定"
          - " allow/deny ルールで破壊的コマンドを既定でブロック"
        expression: comparison
        data:
          mode: table
          axes: ["実行前の確認", "破壊的操作", "適する場面"]
          columns:
            - { name: "プランモード", values: ["計画のみ提示", "実行しない", "設計・調査"] }
            - { name: "許可制(既定推奨)", values: ["都度確認", "確認後のみ", "通常の開発"] }
            - { name: "自動承認", values: ["なし", "そのまま実行", "隔離環境限定"] }

      - title: "対策2: シークレット管理と隔離"
        summary: "シークレットは『読ませない・置かない・隔離する』を徹底し、流出経路を物理的に断つ。"
        content:
          - "読ませない: .env / secrets を deny ルールと除外設定で対象外に"
          - "置かない: 鍵はリポジトリ外、.gitignore でコミット防止"
          - "隔離する: サンドボックス/コンテナで本番認証情報に触れさせない"
          - "最小権限: トークンは用途を絞った短命なものを使う"
        expression: bullet
        data: {}

      - title: "対策3: レビューと信頼できないコンテンツの扱い"
        summary: "差分は必ず人がレビューし、信頼できない入力はデータとして扱い指示にしない。"
        content:
          - "差分レビュー: 変更は人が確認してからコミット/プッシュ"
          - "コミット前確認: force push・本番反映は手動ゲートを置く"
          - "信頼できないコンテンツ: 外部Issue/Web/MCP応答を『命令』として実行しない"
          - "自動レビュー: 公式 security-guidance プラグイン等で変更を機械チェック（要確認: 提供状況）"
        expression: bullet
        data: {}

  - chapter: "詳細"
    slides:
      - title: "万一に備える: インシデント対応フロー"
        summary: "防御をすり抜けても、検知から復旧・再発防止まで回せる運用を用意しておく。"
        content:
          - "検知: 監査ログ・差分・異常なコマンドを把握"
          - "封じ込め: 権限剥奪・該当トークン失効・隔離環境停止"
          - "復旧: バージョン管理から安全な状態へ戻す"
          - "再発防止: deny ルール / レビュー手順を更新"
        expression: flow
        data:
          type: steps
          orientation: horizontal
          steps:
            - { label: "検知", desc: "監査ログ・差分監視" }
            - { label: "封じ込め", desc: "権限剥奪・トークン失効" }
            - { label: "復旧", desc: "Git から安全状態へ復元" }
            - { label: "再発防止", desc: "ルール・手順を更新" }

  - chapter: "効果"
    slides:
      - title: "対策導入の効果(Before / After)"
        summary: "三層防御で『取り返しのつかない事故』を仕組みで止め、安心して活用できる状態になる。"
        content:
          - "Before: 全許可・隔離なし・レビュー任意で事故が起きうる"
          - "After: 許可制+隔離+必須レビューで重大操作を未然に遮断"
          - "数値はあくまで一般論。自組織で計測して確認する"
        expression: comparison
        data:
          mode: two-column
          left:
            label: "Before（無防備）"
            items:
              - "全許可で破壊的操作が自動実行"
              - "シークレットが読み取り可能"
              - "差分レビューは任意"
              - "汚染入力を指示として実行"
          right:
            label: "After（三層防御）"
            items:
              - "許可制/プランモードで都度確認"
              - "シークレットは読ませない・隔離"
              - "コミット前レビューを必須化"
              - "信頼できない入力はデータ扱い"
          note: "要確認(例示値): 効果の定量値は自組織での計測が必要。本スライドの主張は一般論。"

  - chapter: "まとめ"
    slides:
      - title: "まとめ"
        summary: "Claude Code の安全性は『最小権限・隔離・人によるレビュー』の3原則に集約される。"
        content:
          - "権限: 既定を安全側に。許可制/プランモードを基本にする"
          - "隔離: サンドボックスでシークレットと本番から切り離す"
          - "レビュー: 差分は人が確認し、汚染入力を指示にしない"
        expression: bullet
        data: {}

  - chapter: "Next Action"
    slides:
      - title: "明日からの一歩"
        summary: "まずは権限とシークレットの初期設定を整え、レビュー手順をチームに明文化する。"
        content:
          - "1. 権限モードを許可制に設定し、破壊的コマンドの deny ルールを追加"
          - "2. .env/secrets を除外設定と .gitignore で読ませない・置かない"
          - "3. サンドボックス/コンテナで隔離実行する環境を用意"
          - "4. 差分レビュー&コミット前確認の手順をチームで合意・明文化"
          - "5. 自動レビュー(security-guidance 等)の導入を評価（要確認: 提供状況）"
        expression: bullet
        data: {}
