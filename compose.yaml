# life-os ローカル開発用 Docker Compose
# 設計根拠: docs/adr/0004-docker-test-environment.md
#
# 使い方:
#   docker compose run --rm test    # スモークテスト（pytest）
#   docker compose run --rm lint    # 領域境界検査（lint-imports / .importlinter）
#   docker compose build            # イメージを明示的にビルド
#
# test / lint は同一イメージ（docker/Dockerfile）を共有し、実行コマンドだけ替える。
# ソースをマウントし、実行時は --no-sync（editable 導入済み）のため、
# コード変更は再ビルド無しで即反映される。依存を変えたときだけ `build` し直す。
name: life-os

services:
  # スモークテスト実行（各 Bounded Context の pytest）
  test:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: life-os-test:local
    # ソースをマウントして反復実行を速くする（venv は /opt/venv でマウント対象外）
    volumes:
      - .:/workspace
    command: ["uv", "run", "--no-sync", "pytest"]

  # 領域境界（.importlinter）検査
  lint:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: life-os-test:local
    volumes:
      - .:/workspace
    command: ["uv", "run", "--no-sync", "lint-imports"]

  # PPTX → PNG 変換（LibreOffice + pdftoppm）
  # テストイメージと分離して管理（LibreOffice は ~400MB と大きいため）
  #
  # 使い方:
  #   docker compose run --rm pptx-convert bash scripts/deckgen/tools/pptx_to_png.sh <slug>
  #
  # 初回は build が必要（時間がかかる）:
  #   docker compose build pptx-convert
  pptx-convert:
    build:
      context: .
      dockerfile: docker/Dockerfile.pptx-convert
    image: life-os-pptx-convert:local
    volumes:
      - .:/workspace
    working_dir: /workspace

  # certification 資格学習サイト（ローカル開発）。設計根拠: docs/adr/0011。
  #   docker compose up cert-backend cert-frontend
  #   → フロント http://localhost:5173 、API http://localhost:8000
  #
  # 単一ユーザー認証は環境変数で与える（平文パスワードはコミットしない）。
  # 下記は開発用の既定値。自分の資格情報は .env などで上書きすること:
  #   CERT_USER_EMAIL / CERT_USER_PASSWORD（または CERT_USER_PASSWORD_HASH）
  cert-backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.certification
    image: life-os-cert-backend:local
    environment:
      CERT_USER_EMAIL: ${CERT_USER_EMAIL:-dev@example.com}
      CERT_USER_PASSWORD: ${CERT_USER_PASSWORD:-devpassword}
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"

  # React(Vite) 開発サーバ。node イメージで直接起動（ビルドツールは npm 側の責務）。
  cert-frontend:
    image: node:20-slim
    working_dir: /app
    environment:
      VITE_API_TARGET: http://cert-backend:8000
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host"
    volumes:
      - ./domains/certification/frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - cert-backend
